<!-- ✅ STEP 1: Add Google Analytics (GA4) 
     Paste this BEFORE the closing </head> tag.
     After pasting, replace G-XXXXXXXXXX with your real 
     Measurement ID from analytics.google.com
-->

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LF31LBNXP6"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LF31LBNXP6', {
    send_page_view: true
  });

  // Track CV download button clicks
  function trackDownload() {
    gtag('event', 'cv_download', {
      event_category: 'engagement',
      event_label: 'CV PDF Download',
    });
  }
</script>
<!-- End Google Analytics -->


<!-- ✅ STEP 2: Add the Download CV button
     Find the block that has your name and title near the top of <body>.
     Paste this button right after your contact info line (after the ✉ email line).
-->

<a 
  href="Antony_Ancil_CV.pdf" 
  download="Antony_Ancil_CV.pdf"
  onclick="trackDownload()"
  style="
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 10px 22px;
    background: #2563eb;
    color: #ffffff;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 600;
    font-size: 14px;
    font-family: inherit;
    transition: background 0.2s;
  "
  onmouseover="this.style.background='#1d4ed8'"
  onmouseout="this.style.background='#2563eb'"
>
  ⬇ Download CV (PDF)
</a>


<!-- ✅ STEP 3: Upload the PDF file to your GitHub repo

     your cv repository (same folder as index.html).
     Commit and push.
